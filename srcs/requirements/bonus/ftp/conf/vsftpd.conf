listen=YES
listen_ipv6=NO

anonymous_enable=NO
local_enable=YES
write_enable=YES

local_umask=022

dirmessage_enable=YES
use_localtime=YES

xferlog_enable=YES
connect_from_port_20=YES

chroot_local_user=YES
allow_writeable_chroot=YES

local_root=/ftp-data

pasv_enable=YES
pasv_min_port=30000
pasv_max_port=30009

secure_chroot_dir=/var/run/vsftpd/empty

pam_service_name=vsftpd

# userlist_enable=YES
